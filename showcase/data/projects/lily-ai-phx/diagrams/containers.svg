<svg viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg" style="width:100%" role="img" aria-label="C4 Container Diagram - Lily Platform Internal Architecture">
  <defs>
    <marker id="cnt-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#71717a"/>
    </marker>
    <marker id="cnt-arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#10b981"/>
    </marker>
    <filter id="cnt-shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="800" height="580" fill="transparent"/>

  <!-- ===== LAYER 1: CLIENT TIER ===== -->
  <rect x="20" y="12" width="760" height="68" rx="6" fill="none" stroke="#10b981" stroke-dasharray="4 3" opacity="0.45"/>
  <text x="32" y="26" fill="#6ee7b7" font-size="9" font-family="system-ui" font-weight="600">Client Tier</text>

  <!-- Browser -->
  <g filter="url(#cnt-shadow)">
    <rect x="140" y="34" width="200" height="36" rx="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
    <text x="240" y="52" text-anchor="middle" fill="#10b981" font-size="10" font-family="system-ui" font-weight="600">Browser</text>
    <text x="240" y="63" text-anchor="middle" fill="#065f46" font-size="8" font-family="ui-monospace, monospace">Phoenix LiveView + WebSocket</text>
  </g>

  <!-- Mobile PWA -->
  <g filter="url(#cnt-shadow)">
    <rect x="460" y="34" width="200" height="36" rx="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
    <text x="560" y="52" text-anchor="middle" fill="#10b981" font-size="10" font-family="system-ui" font-weight="600">Mobile</text>
    <text x="560" y="63" text-anchor="middle" fill="#065f46" font-size="8" font-family="ui-monospace, monospace">PWA (installable)</text>
  </g>

  <!-- Arrow: Client -> API -->
  <line x1="240" y1="70" x2="350" y2="112" stroke="#71717a" stroke-width="1" marker-end="url(#cnt-arrow)"/>
  <line x1="560" y1="70" x2="450" y2="112" stroke="#71717a" stroke-width="1" marker-end="url(#cnt-arrow)"/>
  <text x="400" y="98" text-anchor="middle" fill="#3f3f46" font-size="7" font-family="ui-monospace, monospace">HTTPS / WSS</text>

  <!-- ===== LAYER 2: API GATEWAY ===== -->
  <rect x="20" y="100" width="760" height="60" rx="6" fill="none" stroke="#6366f1" stroke-dasharray="4 3" opacity="0.45"/>
  <text x="32" y="114" fill="#a5b4fc" font-size="9" font-family="system-ui" font-weight="600">API Gateway</text>

  <!-- Phoenix Router -->
  <g filter="url(#cnt-shadow)">
    <rect x="250" y="114" width="300" height="36" rx="8" fill="#1a1740" stroke="#6366f1" stroke-width="1.5"/>
    <text x="400" y="132" text-anchor="middle" fill="#6366f1" font-size="11" font-family="system-ui" font-weight="600">Phoenix Router</text>
    <text x="400" y="143" text-anchor="middle" fill="#312e81" font-size="8" font-family="ui-monospace, monospace">HTTP + LiveView + Channels</text>
    <!-- Route count badge -->
    <rect x="518" y="118" width="26" height="14" rx="7" fill="#6366f1" opacity="0.2"/>
    <text x="531" y="128" text-anchor="middle" fill="#a5b4fc" font-size="7" font-family="ui-monospace, monospace">45+</text>
  </g>

  <!-- Arrow: API -> Application -->
  <line x1="400" y1="150" x2="400" y2="178" stroke="#71717a" stroke-width="1" marker-end="url(#cnt-arrow)"/>

  <!-- ===== LAYER 3: APPLICATION ===== -->
  <rect x="20" y="170" width="760" height="130" rx="6" fill="none" stroke="#a855f7" stroke-dasharray="4 3" opacity="0.45"/>
  <text x="32" y="184" fill="#c084fc" font-size="9" font-family="system-ui" font-weight="600">Application Tier</text>

  <!-- LiveViews -->
  <g filter="url(#cnt-shadow)">
    <rect x="40" y="196" width="160" height="88" rx="8" fill="#1e1533" stroke="#a855f7" stroke-width="1.5"/>
    <text x="120" y="218" text-anchor="middle" fill="#a855f7" font-size="10" font-family="system-ui" font-weight="600">LiveViews</text>
    <rect x="153" y="208" width="26" height="14" rx="7" fill="#a855f7" opacity="0.2"/>
    <text x="166" y="218" text-anchor="middle" fill="#c084fc" font-size="7" font-family="ui-monospace, monospace">30</text>
    <text x="120" y="235" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">Admin Portal</text>
    <text x="120" y="247" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">Therapist Dashboard</text>
    <text x="120" y="259" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">User Dashboard</text>
    <text x="120" y="271" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">Org Portal</text>
  </g>

  <!-- Contexts -->
  <g filter="url(#cnt-shadow)">
    <rect x="220" y="196" width="160" height="88" rx="8" fill="#1e1533" stroke="#a855f7" stroke-width="1.5"/>
    <text x="300" y="218" text-anchor="middle" fill="#a855f7" font-size="10" font-family="system-ui" font-weight="600">Contexts</text>
    <rect x="340" y="208" width="26" height="14" rx="7" fill="#a855f7" opacity="0.2"/>
    <text x="353" y="218" text-anchor="middle" fill="#c084fc" font-size="7" font-family="ui-monospace, monospace">19</text>
    <text x="300" y="235" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">Accounts / Auth</text>
    <text x="300" y="247" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">Therapy / Quizzes</text>
    <text x="300" y="259" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">Messaging / Billing</text>
    <text x="300" y="271" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">Organizations / CMS</text>
  </g>

  <!-- GenServers -->
  <g filter="url(#cnt-shadow)">
    <rect x="400" y="196" width="160" height="88" rx="8" fill="#1e1533" stroke="#a855f7" stroke-width="1.5"/>
    <text x="480" y="218" text-anchor="middle" fill="#a855f7" font-size="10" font-family="system-ui" font-weight="600">GenServers</text>
    <text x="480" y="235" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">SubmissionSyncer</text>
    <text x="480" y="247" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">CoachAI Session</text>
    <text x="480" y="259" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">FeatureFlags</text>
    <text x="480" y="271" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">RateLimiter</text>
  </g>

  <!-- Hooks -->
  <g filter="url(#cnt-shadow)">
    <rect x="580" y="196" width="180" height="88" rx="8" fill="#1e1533" stroke="#a855f7" stroke-width="1.5"/>
    <text x="670" y="218" text-anchor="middle" fill="#a855f7" font-size="10" font-family="system-ui" font-weight="600">JS Hooks</text>
    <text x="670" y="235" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">LottiePlayer</text>
    <text x="670" y="247" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">TipTapEditor</text>
    <text x="670" y="259" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">DevToolsWidget</text>
    <text x="670" y="271" text-anchor="middle" fill="#52525b" font-size="7.5" font-family="ui-monospace, monospace">QuizDraft + ChartHook</text>
  </g>

  <!-- Arrows: Application -> Data -->
  <line x1="120" y1="284" x2="180" y2="336" stroke="#71717a" stroke-width="1" marker-end="url(#cnt-arrow)"/>
  <line x1="300" y1="284" x2="300" y2="336" stroke="#71717a" stroke-width="1" marker-end="url(#cnt-arrow)"/>
  <line x1="480" y1="284" x2="420" y2="336" stroke="#71717a" stroke-width="1" marker-end="url(#cnt-arrow)"/>
  <text x="400" y="318" text-anchor="middle" fill="#3f3f46" font-size="7" font-family="ui-monospace, monospace">Ecto Queries / Changesets</text>

  <!-- ===== LAYER 4: DATA ===== -->
  <rect x="20" y="328" width="760" height="78" rx="6" fill="none" stroke="#06b6d4" stroke-dasharray="4 3" opacity="0.45"/>
  <text x="32" y="342" fill="#67e8f9" font-size="9" font-family="system-ui" font-weight="600">Data Layer</text>

  <!-- PostgreSQL -->
  <g filter="url(#cnt-shadow)">
    <rect x="60" y="350" width="200" height="44" rx="8" fill="#0c2d3e" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="160" y="370" text-anchor="middle" fill="#06b6d4" font-size="10" font-family="system-ui" font-weight="600">PostgreSQL</text>
    <text x="160" y="384" text-anchor="middle" fill="#164e63" font-size="8" font-family="ui-monospace, monospace">Azure Database for PostgreSQL</text>
  </g>

  <!-- Ecto -->
  <g filter="url(#cnt-shadow)">
    <rect x="290" y="350" width="200" height="44" rx="8" fill="#0c2d3e" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="390" y="370" text-anchor="middle" fill="#06b6d4" font-size="10" font-family="system-ui" font-weight="600">Ecto</text>
    <rect x="414" y="360" width="46" height="14" rx="7" fill="#06b6d4" opacity="0.2"/>
    <text x="437" y="370" text-anchor="middle" fill="#67e8f9" font-size="7" font-family="ui-monospace, monospace">51 schemas</text>
    <text x="390" y="384" text-anchor="middle" fill="#164e63" font-size="8" font-family="ui-monospace, monospace">Migrations + Changesets</text>
  </g>

  <!-- Seeds -->
  <g filter="url(#cnt-shadow)">
    <rect x="520" y="350" width="200" height="44" rx="8" fill="#0c2d3e" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="620" y="370" text-anchor="middle" fill="#06b6d4" font-size="10" font-family="system-ui" font-weight="600">Seeds</text>
    <text x="620" y="384" text-anchor="middle" fill="#164e63" font-size="8" font-family="ui-monospace, monospace">109 icons + demo data + roles</text>
  </g>

  <!-- Arrows: Data -> External -->
  <line x1="160" y1="394" x2="120" y2="438" stroke="#52525b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#cnt-arrow)"/>
  <line x1="300" y1="394" x2="300" y2="438" stroke="#52525b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#cnt-arrow)"/>
  <line x1="480" y1="394" x2="490" y2="438" stroke="#52525b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#cnt-arrow)"/>
  <line x1="600" y1="394" x2="680" y2="438" stroke="#52525b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#cnt-arrow)"/>

  <!-- ===== LAYER 5: EXTERNAL ===== -->
  <rect x="20" y="430" width="760" height="68" rx="6" fill="none" stroke="#3f3f46" stroke-dasharray="4 3" opacity="0.45"/>
  <text x="32" y="444" fill="#71717a" font-size="9" font-family="system-ui" font-weight="600">External Services</text>

  <!-- Supabase Auth -->
  <g filter="url(#cnt-shadow)">
    <rect x="40" y="452" width="130" height="36" rx="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
    <text x="105" y="468" text-anchor="middle" fill="#10b981" font-size="9" font-family="system-ui" font-weight="600">Supabase Auth</text>
    <text x="105" y="480" text-anchor="middle" fill="#065f46" font-size="7" font-family="system-ui">JWT + RBAC</text>
  </g>

  <!-- Stripe -->
  <g filter="url(#cnt-shadow)">
    <rect x="195" y="452" width="130" height="36" rx="8" fill="#0c1e3e" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="260" y="468" text-anchor="middle" fill="#3b82f6" font-size="9" font-family="system-ui" font-weight="600">Stripe</text>
    <text x="260" y="480" text-anchor="middle" fill="#1e3a5f" font-size="7" font-family="system-ui">Subscriptions</text>
  </g>

  <!-- SendGrid -->
  <g filter="url(#cnt-shadow)">
    <rect x="350" y="452" width="130" height="36" rx="8" fill="#2d1f06" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="415" y="468" text-anchor="middle" fill="#f59e0b" font-size="9" font-family="system-ui" font-weight="600">SendGrid</text>
    <text x="415" y="480" text-anchor="middle" fill="#78350f" font-size="7" font-family="system-ui">Swoosh Mailer</text>
  </g>

  <!-- Claude AI -->
  <g filter="url(#cnt-shadow)">
    <rect x="505" y="452" width="130" height="36" rx="8" fill="#1e1533" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="570" y="468" text-anchor="middle" fill="#8b5cf6" font-size="9" font-family="system-ui" font-weight="600">Claude AI</text>
    <text x="570" y="480" text-anchor="middle" fill="#4c1d95" font-size="7" font-family="system-ui">Coaching Engine</text>
  </g>

  <!-- Azure -->
  <g filter="url(#cnt-shadow)">
    <rect x="660" y="452" width="100" height="36" rx="8" fill="#0c2d3e" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="710" y="468" text-anchor="middle" fill="#06b6d4" font-size="9" font-family="system-ui" font-weight="600">Azure</text>
    <text x="710" y="480" text-anchor="middle" fill="#164e63" font-size="7" font-family="system-ui">ACR + ACA</text>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(120, 518)">
    <rect x="0" y="0" width="560" height="32" rx="6" fill="#18181b" stroke="#27272a" stroke-width="1"/>

    <rect x="16" y="9" width="10" height="10" rx="2" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="0.5"/>
    <text x="32" y="18" fill="#a1a1aa" font-size="9" font-family="system-ui">Client</text>

    <rect x="76" y="9" width="10" height="10" rx="2" fill="#6366f1" opacity="0.3" stroke="#6366f1" stroke-width="0.5"/>
    <text x="92" y="18" fill="#a1a1aa" font-size="9" font-family="system-ui">API</text>

    <rect x="124" y="9" width="10" height="10" rx="2" fill="#a855f7" opacity="0.3" stroke="#a855f7" stroke-width="0.5"/>
    <text x="140" y="18" fill="#a1a1aa" font-size="9" font-family="system-ui">Application</text>

    <rect x="214" y="9" width="10" height="10" rx="2" fill="#06b6d4" opacity="0.3" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="230" y="18" fill="#a1a1aa" font-size="9" font-family="system-ui">Data</text>

    <rect x="272" y="9" width="10" height="10" rx="2" fill="#3f3f46" opacity="0.3" stroke="#52525b" stroke-width="0.5"/>
    <text x="288" y="18" fill="#a1a1aa" font-size="9" font-family="system-ui">External</text>

    <line x1="350" y1="14" x2="370" y2="14" stroke="#71717a" stroke-width="1" marker-end="url(#cnt-arrow)"/>
    <text x="376" y="18" fill="#a1a1aa" font-size="9" font-family="system-ui">Internal</text>

    <line x1="430" y1="14" x2="450" y2="14" stroke="#52525b" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="456" y="18" fill="#a1a1aa" font-size="9" font-family="system-ui">Integration</text>
  </g>

  <!-- Title watermark -->
  <text x="400" y="568" text-anchor="middle" fill="#27272a" font-size="8" font-family="system-ui">Lily Platform -- C4 Container View</text>
</svg>