<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="660" fill="#09090b"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" fill="#f4f4f5" font-size="16" font-weight="600">LFG — C4 Level 2: Container Diagram</text>
  <text x="500" y="54" text-anchor="middle" fill="#71717a" font-size="11">[Container View] Internal structure of the LFG system</text>

  <!-- System boundary -->
  <rect x="140" y="75" width="700" height="500" rx="10" fill="none" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="490" y="590" text-anchor="middle" fill="#52525b" font-size="10">[System Boundary] LFG</text>

  <!-- Dispatcher -->
  <rect x="380" y="100" width="220" height="80" rx="6" fill="#7e22ce" filter="url(#shadow)"/>
  <text x="490" y="134" text-anchor="middle" fill="#f4f4f5" font-size="13" font-weight="700">LFG Dispatcher</text>
  <text x="490" y="151" text-anchor="middle" fill="#d8b4fe" font-size="10">[Bash Script]</text>
  <text x="490" y="167" text-anchor="middle" fill="#e9d5ff" font-size="10">~/tools/@yj/lfg/lfg · routes to 9 modules</text>

  <!-- Row 1: Bash Modules -->
  <!-- WTFS -->
  <rect x="160" y="240" width="130" height="75" rx="5" fill="#581c87" filter="url(#shadow)"/>
  <text x="225" y="268" text-anchor="middle" fill="#f4f4f5" font-size="11" font-weight="600">WTFS</text>
  <text x="225" y="283" text-anchor="middle" fill="#d8b4fe" font-size="9">[Bash Module]</text>
  <text x="225" y="298" text-anchor="middle" fill="#e9d5ff" font-size="9">Disk scanner</text>
  <text x="225" y="311" text-anchor="middle" fill="#e9d5ff" font-size="9">lib/scan.sh</text>

  <!-- DTF -->
  <rect x="305" y="240" width="130" height="75" rx="5" fill="#581c87" filter="url(#shadow)"/>
  <text x="370" y="268" text-anchor="middle" fill="#f4f4f5" font-size="11" font-weight="600">DTF</text>
  <text x="370" y="283" text-anchor="middle" fill="#d8b4fe" font-size="9">[Bash Module]</text>
  <text x="370" y="298" text-anchor="middle" fill="#e9d5ff" font-size="9">Cache cleaner</text>
  <text x="370" y="311" text-anchor="middle" fill="#e9d5ff" font-size="9">lib/clean.sh</text>

  <!-- BTAU -->
  <rect x="450" y="240" width="130" height="75" rx="5" fill="#581c87" filter="url(#shadow)"/>
  <text x="515" y="268" text-anchor="middle" fill="#f4f4f5" font-size="11" font-weight="600">BTAU</text>
  <text x="515" y="283" text-anchor="middle" fill="#d8b4fe" font-size="9">[Bash Module]</text>
  <text x="515" y="298" text-anchor="middle" fill="#e9d5ff" font-size="9">Backup lifecycle</text>
  <text x="515" y="311" text-anchor="middle" fill="#e9d5ff" font-size="9">lib/btau.sh</text>

  <!-- SSD -->
  <rect x="595" y="240" width="130" height="75" rx="5" fill="#581c87" filter="url(#shadow)"/>
  <text x="660" y="268" text-anchor="middle" fill="#f4f4f5" font-size="11" font-weight="600">SSD</text>
  <text x="660" y="283" text-anchor="middle" fill="#d8b4fe" font-size="9">[Bash Module]</text>
  <text x="660" y="298" text-anchor="middle" fill="#e9d5ff" font-size="9">Spotlight manager</text>
  <text x="660" y="311" text-anchor="middle" fill="#e9d5ff" font-size="9">lib/ssd.sh</text>

  <!-- Row 2 -->
  <!-- DEVDRIVE (Python3) -->
  <rect x="160" y="370" width="200" height="90" rx="5" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="260" y="398" text-anchor="middle" fill="#f4f4f5" font-size="11" font-weight="600">DEVDRIVE Engine</text>
  <text x="260" y="413" text-anchor="middle" fill="#93c5fd" font-size="9">[Bash + Python3]</text>
  <text x="260" y="428" text-anchor="middle" fill="#bfdbfe" font-size="9">APFS vol · reconcile · migrate</text>
  <text x="260" y="443" text-anchor="middle" fill="#bfdbfe" font-size="9">lib/devdrive.sh + devdrive/*.py</text>
  <text x="260" y="456" text-anchor="middle" fill="#bfdbfe" font-size="9">~1040 lines · inline Python3</text>

  <!-- Swift Viewer -->
  <rect x="380" y="370" width="200" height="90" rx="5" fill="#0f2d1f" filter="url(#shadow)"/>
  <text x="480" y="398" text-anchor="middle" fill="#f4f4f5" font-size="11" font-weight="600">LFG.app Viewer</text>
  <text x="480" y="413" text-anchor="middle" fill="#6ee7b7" font-size="9">[Swift AppKit]</text>
  <text x="480" y="428" text-anchor="middle" fill="#a7f3d0" font-size="9">HTTP server · port 8080</text>
  <text x="480" y="443" text-anchor="middle" fill="#a7f3d0" font-size="9">WebKit showcase viewer</text>
  <text x="480" y="456" text-anchor="middle" fill="#a7f3d0" font-size="9">.build/release/LFG</text>

  <!-- Menubar Helper -->
  <rect x="600" y="370" width="200" height="90" rx="5" fill="#2d1a0f" filter="url(#shadow)"/>
  <text x="700" y="398" text-anchor="middle" fill="#f4f4f5" font-size="11" font-weight="600">Menubar Helper</text>
  <text x="700" y="413" text-anchor="middle" fill="#fcd34d" font-size="9">[Swift AppKit]</text>
  <text x="700" y="428" text-anchor="middle" fill="#fde68a" font-size="9">Pressure indicator</text>
  <text x="700" y="443" text-anchor="middle" fill="#fde68a" font-size="9">D3.js history graph</text>
  <text x="700" y="456" text-anchor="middle" fill="#fde68a" font-size="9">MenuBarExtra · 60s refresh</text>

  <!-- State Store -->
  <rect x="350" y="510" width="200" height="55" rx="5" fill="#1c1917" stroke="#44403c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="535" text-anchor="middle" fill="#a1a1aa" font-size="11" font-weight="600">State Store</text>
  <text x="450" y="549" text-anchor="middle" fill="#71717a" font-size="9">~/.config/lfg/state.json · devdrive_state.json</text>

  <!-- Arrows: Dispatcher → modules -->
  <line x1="420" y1="180" x2="225" y2="238" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="180" x2="370" y2="238" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="490" y1="180" x2="490" y2="238" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="540" y1="180" x2="660" y2="238" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="430" y1="180" x2="260" y2="368" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="490" y1="180" x2="480" y2="368" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="560" y1="180" x2="700" y2="368" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- DevDrive → State -->
  <line x1="280" y1="460" x2="380" y2="510" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Menubar → State -->
  <line x1="680" y1="460" x2="540" y2="510" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- External: CCEM APM -->
  <rect x="10" y="390" width="120" height="60" rx="5" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="70" y="414" text-anchor="middle" fill="#a1a1aa" font-size="10" font-weight="600">CCEM APM</text>
  <text x="70" y="428" text-anchor="middle" fill="#71717a" font-size="9">localhost:3032</text>
  <text x="70" y="442" text-anchor="middle" fill="#71717a" font-size="9">Phoenix/Elixir</text>

  <!-- DevDrive → APM -->
  <line x1="160" y1="415" x2="132" y2="415" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="148" y="410" text-anchor="middle" fill="#6b7280" font-size="8">notify</text>

  <!-- External: macOS APIs -->
  <rect x="860" y="370" width="125" height="90" rx="5" fill="#18181b" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="922" y="394" text-anchor="middle" fill="#a1a1aa" font-size="10" font-weight="600">macOS APIs</text>
  <text x="922" y="408" text-anchor="middle" fill="#71717a" font-size="9">hdiutil</text>
  <text x="922" y="422" text-anchor="middle" fill="#71717a" font-size="9">diskutil</text>
  <text x="922" y="436" text-anchor="middle" fill="#71717a" font-size="9">launchctl</text>
  <text x="922" y="450" text-anchor="middle" fill="#71717a" font-size="9">mds · NSWorkspace</text>

  <!-- DevDrive → macOS -->
  <line x1="360" y1="415" x2="858" y2="415" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="610" y="408" text-anchor="middle" fill="#6b7280" font-size="9">APFS · hdiutil · fsck</text>

  <!-- Legend -->
  <rect x="30" y="610" width="10" height="10" rx="2" fill="#7e22ce"/>
  <text x="46" y="620" fill="#71717a" font-size="10">Dispatcher</text>
  <rect x="120" y="610" width="10" height="10" rx="2" fill="#581c87"/>
  <text x="136" y="620" fill="#71717a" font-size="10">Bash Module</text>
  <rect x="220" y="610" width="10" height="10" rx="2" fill="#1e3a5f"/>
  <text x="236" y="620" fill="#71717a" font-size="10">Python3</text>
  <rect x="290" y="610" width="10" height="10" rx="2" fill="#0f2d1f"/>
  <text x="306" y="620" fill="#71717a" font-size="10">Swift AppKit</text>
  <rect x="390" y="610" width="10" height="10" rx="2" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="406" y="620" fill="#71717a" font-size="10">External</text>
</svg>
