<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCEM Showcase — Queryable Interface + Diagram Engine</title>
  
  <!-- External Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/anime@4/lib/anime.min.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      line-height: 1.5;
    }

    .app-container {
      display: grid;
      grid-template-columns: 320px 1fr 300px;
      grid-template-rows: auto 1fr;
      height: 100vh;
      gap: 0;
    }

    .app-header {
      grid-column: 1 / -1;
      padding: 12px 16px;
      background: rgba(15, 15, 25, 0.6);
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .version-badge {
      padding: 4px 8px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid #22c55e;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      color: #22c55e;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      color: #818cf8;
    }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: rgba(30, 30, 45, 0.8);
      border-radius: 4px;
      font-size: 10px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .left-column {
      grid-column: 1;
      grid-row: 2;
      overflow-y: auto;
      padding: 16px;
      border-right: 1px solid rgba(99, 102, 241, 0.1);
      background: rgba(10, 10, 15, 0.6);
    }

    .center-column {
      grid-column: 2;
      grid-row: 2;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .right-column {
      grid-column: 3;
      grid-row: 2;
      overflow-y: auto;
      padding: 16px;
      border-left: 1px solid rgba(99, 102, 241, 0.1);
      background: rgba(10, 10, 15, 0.6);
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #818cf8;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .queryable-section {
      background: rgba(15, 15, 25, 0.6);
      border: 1px solid rgba(99, 102, 241, 0.1);
      border-radius: 8px;
      overflow: hidden;
      min-height: 400px;
      flex: 1;
    }

    .diagram-section {
      background: rgba(15, 15, 25, 0.6);
      border: 1px solid rgba(99, 102, 241, 0.1);
      border-radius: 8px;
      padding: 16px;
      overflow: hidden;
      min-height: 500px;
      flex: 1;
    }

    .diagram-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    .control-btn {
      padding: 6px 12px;
      background: rgba(51, 65, 85, 0.5);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: #e2e8f0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 500;
      transition: all 150ms ease;
    }

    .control-btn:hover {
      background: rgba(99, 102, 241, 0.2);
      border-color: #818cf8;
    }

    .control-btn.active {
      background: rgba(99, 102, 241, 0.3);
      border-color: #818cf8;
      color: #818cf8;
    }

    .diagram-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
      background: rgba(30, 30, 45, 0.4);
      border-radius: 6px;
      padding: 16px;
      overflow: auto;
    }

    .diagram-container svg {
      max-width: 100%;
      height: auto;
      filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.1));
    }

    .resource-card {
      padding: 12px;
      background: rgba(30, 30, 45, 0.4);
      border: 1px solid rgba(99, 102, 241, 0.1);
      border-radius: 6px;
      font-size: 10px;
      margin-bottom: 8px;
    }

    .resource-label {
      color: #94a3b8;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .resource-value {
      color: #e2e8f0;
      font-family: 'Fira Code', monospace;
      word-break: break-word;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(30, 30, 45, 0.4);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(99, 102, 241, 0.5);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="app-header">
      <div class="header-left">
        <span class="version-badge">v2.1.0</span>
        <span class="title">CCEM Showcase — Queryable Interface</span>
      </div>
      <div class="header-right">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>APM Connected</span>
        </div>
      </div>
    </div>

    <!-- Left Column: Feature Cards / Navigation -->
    <div class="left-column">
      <div class="section-title">Features</div>
      <div id="feature-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>

    <!-- Center Column: Queryable Tabs + Diagrams -->
    <div class="center-column">
      <div class="queryable-section">
        <div class="section-title" style="padding: 12px 16px 0;">Queryable Tabs</div>
        <div id="queryable-tabs"></div>
      </div>

      <div class="diagram-section">
        <div class="section-title">Diagram Engine</div>
        <div class="diagram-controls">
          <button class="control-btn active" data-diagram="container">Container</button>
          <button class="control-btn" data-diagram="context">Context</button>
          <button class="control-btn" data-diagram="dataflow">Data Flow</button>
          <button class="control-btn" data-diagram="processflow">Process Flow</button>
          <button class="control-btn">🎬 Animate</button>
        </div>
        <div class="diagram-container" id="diagram-canvas">
          <div style="text-align: center; color: #94a3b8;">
            <p>Select a diagram type above to render</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Column: Resource Inspector -->
    <div class="right-column">
      <div class="section-title">Resources</div>
      
      <div class="resource-card">
        <div class="resource-label">APM Status</div>
        <div class="resource-value" id="apm-status">Checking...</div>
      </div>

      <div class="resource-card">
        <div class="resource-label">Active Agents</div>
        <div class="resource-value" id="active-agents">—</div>
      </div>

      <div class="resource-card">
        <div class="resource-label">Uptime</div>
        <div class="resource-value" id="uptime">—</div>
      </div>

      <div class="resource-card">
        <div class="resource-label">Git Branch</div>
        <div class="resource-value" id="git-branch">main</div>
      </div>

      <div class="resource-card">
        <div class="resource-label">Stack</div>
        <div class="resource-value">Phoenix 1.7 + LiveView</div>
      </div>
    </div>
  </div>

  <script>
    // Initialize Mermaid
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'loose'
    });

    // Sample diagrams
    const DIAGRAMS = {
      container: `C4Container
    title Container Diagram — CCEM APM

    Person(user, "Developer")
    System_Boundary(ccem, "CCEM APM") {
        Container(web, "Web UI", "Phoenix LiveView", "Dashboard, Formation, Showcase")
        Container(api, "API Layer", "REST", "Status, Agents, Formations")
        Container(genserver, "GenServers", "OTP", "ActionEngine, ShowcaseManager, Analyzers")
        ContainerDb(ets, "ETS Cache", "In-Memory", "Skills, Formations, Showcase Data")
        ContainerQueue(pubsub, "PubSub", "Phoenix", "Real-time Events")
    }
    System_Ext(showcase, "Showcase Client", "HTML/JS")
    Rel(user, web, "Views")
    Rel(web, api, "Calls")
    Rel(api, genserver, "Delegates")
    Rel(genserver, ets, "Reads/Writes")
    Rel(genserver, pubsub, "Broadcasts")
    Rel(web, pubsub, "Subscribes")
    Rel(showcase, api, "Queries")`,
      
      context: `C4Context
    title System Context — CCEM APM

    Person(dev, "Developer", "Uses APM for monitoring")
    Person(pm, "Product Manager", "Views formations and progress")

    System(ccem, "CCEM APM", "Agentic performance monitoring")

    System_Ext(claude, "Claude Code", "Agent execution engine")
    System_Ext(plane, "Plane PM", "Project management")
    System_Ext(showcase, "Showcase", "Live presentation dashboards")

    Rel(dev, ccem, "Monitors")
    Rel(pm, ccem, "Reviews")
    Rel(ccem, claude, "Tracks agents")
    Rel(ccem, plane, "Syncs issues")
    Rel(ccem, showcase, "Feeds data")`,

      dataflow: `graph LR
    A["Developer Request"] -->|HTTP| B["API Layer"]
    B -->|Query| C["GenServer"]
    C -->|Read| D["ETS Cache"]
    D -->|Hit/Miss| E["Response"]
    E -->|JSON| F["Showcase Client"]
    F -->|Render| G["Queryable Tab"]
    G -->|Display| H["User View"]`,

      processflow: `sequenceDiagram
    participant U as User
    participant S as Showcase
    participant A as API
    participant G as GenServer
    participant E as ETS

    U->>S: Selects tab
    S->>A: Query data
    A->>G: Fetch from cache
    G->>E: Lookup ETS
    E-->>G: Return data
    G-->>A: JSON response
    A-->>S: Results
    S->>S: Render queryable tab
    S-->>U: Display results`
    };

    // Initialize tab system
    const tabConfig = {
      tabs: [
        {
          id: 'market-research',
          label: 'Market Research',
          icon: '📊',
          description: 'Competitive analysis and market data',
          dataSource: async () => [
            {title: 'Market Size', content: 'Global agent monitoring: $5.2B by 2028'},
            {title: 'Competitors', content: 'Datadog, New Relic, Grafana, custom solutions'},
            {title: 'Use Cases', content: 'APM, formation tracking, agent lifecycle management'}
          ]
        },
        {
          id: 'architecture',
          label: 'Architecture',
          icon: '🏗️',
          description: 'System design and components',
          dataSource: async () => [
            {title: 'Core Components', content: 'ActionEngine, ShowcaseManager, SkillAnalyzer, AuthGate'},
            {title: 'Data Layer', content: 'ETS caching, GenServer state management, Phoenix PubSub'},
            {title: 'API Surface', content: '56 REST endpoints, OpenAPI 3.0.3 spec'}
          ]
        },
        {
          id: 'features',
          label: 'Features',
          icon: '⚡',
          description: 'Product capabilities and roadmap',
          dataSource: async () => [
            {title: 'Real-time Monitoring', content: 'Live agent tracking, formation visualization, metrics'},
            {title: 'Showcase Integration', content: 'Queryable tabs, diagram engine, animations'},
            {title: 'Authorization', content: 'AgentLock with approval gates and redaction'}
          ]
        },
        {
          id: 'documentation',
          label: 'Documentation',
          icon: '📖',
          description: 'Technical guides and specs',
          dataSource: async () => [
            {title: 'API Reference', content: '/api/v2 OpenAPI spec with all endpoints'},
            {title: 'Formation Model', content: '5-level hierarchy: Formation → Squadron → Swarm → Cluster → Agent'},
            {title: 'Auth System', content: 'PolicyEngine, TokenStore, RedactionEngine'}
          ]
        }
      ],
      debounceMs: 200
    };

    // Initialize QueryableTabs
    const tabsContainer = document.getElementById('queryable-tabs');
    const queryableTabs = new QueryableTabs(tabsContainer, tabConfig);

    // Diagram controls
    let currentDiagram = 'container';
    document.querySelectorAll('[data-diagram]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        currentDiagram = e.target.dataset.diagram;
        document.querySelectorAll('[data-diagram]').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderDiagram(DIAGRAMS[currentDiagram]);
      });
    });

    async function renderDiagram(def) {
      const canvas = document.getElementById('diagram-canvas');
      canvas.innerHTML = '<div style="text-align: center; color: #94a3b8;">Rendering...</div>';
      
      try {
        const id = `diagram-${Date.now()}`;
        const {svg} = await mermaid.render(id, def);
        canvas.innerHTML = svg;
        
        // Apply animation
        const svgEl = canvas.querySelector('svg');
        if (svgEl && window.DiagramAnimator) {
          const animator = new DiagramAnimator();
          animator.progressiveReveal(svgEl);
        }
      } catch (err) {
        canvas.innerHTML = `<div style="color: #ef4444;">Failed to render: ${err.message}</div>`;
      }
    }

    // Resource polling
    async function pollResources() {
      try {
        const res = await fetch('http://localhost:3032/api/status', {mode: 'no-cors'});
        if (res.ok) {
          const data = await res.json();
          document.getElementById('apm-status').textContent = 'Connected';
          document.getElementById('active-agents').textContent = data.agent_count || '—';
          document.getElementById('uptime').textContent = `${Math.floor(data.uptime_seconds / 3600)}h`;
        }
      } catch (e) {
        document.getElementById('apm-status').textContent = 'Offline';
      }
    }

    // Initial render
    renderDiagram(DIAGRAMS.container);
    pollResources();
    setInterval(pollResources, 10000);

    console.log('✓ Showcase Queryable Interface Initialized');
    console.log('✓ Mermaid v11 ready');
    console.log('✓ anime.js ready for animations');
    console.log('✓ QueryableTabs system active');
  </script>

  <!-- Load custom modules (in production, bundle these) -->
  <script src="diagrams/mermaid-engine.js"></script>
  <script src="animations/animator.js"></script>
  <script src="tabs/tabs.js"></script>
</body>
</html>
