# CCEM v4.0.0 Installer Defaults
# Override via flags: --prefix, --skip-service, --skip-hooks, --skip-agent, --skip-cli

# Installation prefix (where CCEM repo lives)
CCEM_DEFAULT_HOME="$HOME/Developer/ccem"

# APM server port
CCEM_APM_PORT=3031

# Git repository
CCEM_REPO_URL="https://github.com/peguesj/ccem.git"

# Minimum dependency versions
MIN_ERLANG_MAJOR=26
MIN_ELIXIR="1.15"
MIN_NODE_MAJOR=18
MIN_SWIFT="5.9"
MIN_MACOS="14"

# Service identifiers
LAUNCHD_SERVER_LABEL="io.pegues.agent-j.labs.ccem.apm-server"
LAUNCHD_AGENT_LABEL="io.pegues.agent-j.labs.ccem.agent"
SYSTEMD_UNIT="ccem-apm.service"

# Claude Code settings path
CLAUDE_SETTINGS="$HOME/.claude/settings.json"

# Hook script names (in order of lifecycle)
HOOK_SCRIPTS=(
  session_init.sh
  pre_tool_use.sh
  post_tool_use.sh
  subagent_start.sh
  subagent_stop.sh
  session_end.sh
)
